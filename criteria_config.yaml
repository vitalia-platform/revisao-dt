# criteria_config.yaml | Atualizado em: 01-06-2026 10:35:37(GMT-04:00)
# Gerado pelo workflow /integrative-review e atualizado pelo Pivot Metodológico (01-06-2026).
# NÃO EDITE MANUALMENTE — use os workflows para regenerar seções específicas.
#
# REGRA: Nenhum script ou agente deste projeto assume valores padrão.
#        Todos lêem exclusivamente deste arquivo.

# ──────────────────────────────────────────────
# IDENTIDADE DO ESTUDO
# ──────────────────────────────────────────────
study:
  title: "Design Thinking aplicado à Saúde Positiva: Ecossistemas de Movimento, Lazer e Sono para a Manutenção da Saúde e Prevenção de DCNTs (2010-2026)"
  time_range: "2010-2026"
  primary_language: "all"
  reference_study_doi: ""
  query_string: >
    ("Design Thinking" OR "Human-Centered Design" OR "Service Design" OR "User-Centered Design" OR "Co-design" OR "Participatory Design" OR "Co-creation")
    AND ("Physical Activity" OR "Sport" OR "Exercise" OR "Leisure" OR "Exergame" OR "Active Lifestyle" OR "Fitness")
    AND 2010:2026[dp]

# ──────────────────────────────────────────────
# METODOLOGIA (Pivot 01-06-2026)
# ──────────────────────────────────────────────
methodology:
  analysis: "Integrative Review (Mendes, Silveira e Galvão, 2008) + DSR Synthesis (vom Brocke et al., 2015)"
  reporting_standard: "PRISMA 2020 / PRISMA-ScR"
  # O PRISMA é usado EXCLUSIVAMENTE como Reporting Standard (transparência da triagem).
  # A síntese e análise seguem o método integrativo + DSR.
  accept_theoretical_studies: true
  accept_gray_literature: true

# ──────────────────────────────────────────────
# CAMINHOS DO AMBIENTE
# ──────────────────────────────────────────────
paths:
  sample_root: "amostra/"
  sample_sources:
    - name: "scopus"
      path: "amostra/scopus/"
      type: "pdf"
    - name: "webofscience"
      path: "amostra/webofscience/"
      type: "csv"
    - name: "biorxiv"
      path: "amostra/biorxiv/"
      type: "json"
  lote_pool: "lotes/"
  output_prisma: "saida/"
  output_fichamentos: "fichamentos/"
  export_root: "exportacao/"
  audit_payloads: "saida/audit/"   # Logs PRISMA-S/trAIce: CSV de query + JSON de payload bruto

# ──────────────────────────────────────────────
# AUDITORIA DE BUSCA (PRISMA-S / PRISMA-trAIce)
# ──────────────────────────────────────────────
audit_logging:
  enabled: true
  save_csv_log: true
  save_json_payload: true        # Evidência irrefutável para revisão por pares — não desabilitar
  timestamp_format: "ISO8601"

# ──────────────────────────────────────────────
# CONFIGURAÇÃO DO SERVIDOR LOCAL E NUVEM (LLM ROUTER)
# ──────────────────────────────────────────────
llm_router:
  strategy: "local_first"
  phases:
    screening:  { backend: "local",  model: "qwen2.5-coder-vitalia:latest" }
    extraction: { backend: "local",  model: "qwen2.5-coder-vitalia:latest" }
    synthesis:  { backend: "cloud",  model: "gemini-2.0" }
  local:
    base_url: "${OLLAMA_BASE_URL}"
    embedding_model: "nomic-embed-text"
  cloud:
    provider: "gemini"
    model: "${CLOUD_LLM_MODEL}"
    api_key: "${CLOUD_LLM_API_KEY}"

# ──────────────────────────────────────────────
# CONFIGURAÇÃO DO PROCESSAMENTO EM LOTE
# ──────────────────────────────────────────────
processing:
  batch_size: 1000

# ──────────────────────────────────────────────
# FONTES PARA RECUPERAÇÃO AUTOMÁTICA DE PDF (Passo 3)
# Prioridade de recuperação baseada na ORIGEM do artigo.
# ──────────────────────────────────────────────
pdf_retrieval_sources:
  - name: "pubmed_central"
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
    enabled: true
    priority_for_origins: ["pubmed", "medline"]
  - name: "europepmc"
    base_url: "https://www.ebi.ac.uk/europepmc/webservices/rest"
    enabled: true
    priority_for_origins: ["europepmc", "preprint"]
  - name: "biorxiv"
    base_url: "https://api.biorxiv.org"
    enabled: true
    priority_for_origins: ["biorxiv", "medrxiv"]
  - name: "unpaywall"
    base_url: "https://api.unpaywall.org/v2"
    enabled: true
    priority_for_origins: []      # Fallback universal
  - name: "crossref"
    base_url: "https://api.crossref.org/works"
    enabled: true
    priority_for_origins: []      # Fallback final

# ──────────────────────────────────────────────
# CRITÉRIOS DE ELEGIBILIDADE
# ──────────────────────────────────────────────
criteria:
  high_value_domains:
    - "Design Thinking"
    - "Teoria da Autodeterminação"
    - "Salutogênese"
    - "Saúde Positiva"
    - "Wellness"

  # Kernel Theories buscadas ativamente no Passo 4 (Fichamento DSR)
  kernel_theories_of_interest:
    - "Self-Determination Theory (Deci & Ryan)"
    - "Salutogenesis (Antonovsky)"
    - "Design Thinking (Brown / IDEO / Stanford d.school)"
    - "Positive Health (Seligman)"
    - "Behavior Change Theory (Fogg / Prochaska)"

  inclusion:
    - "Publicações entre 2010 e 2026 (C1)."
    - "Uso do Design como método de co-criação e resolução de problemas complexos (C2)."
    - "Cruzamento obrigatório entre Design e Comportamento/Saúde/Esporte (C3)."
    - "Estudos que abordem dieta devem incluir intervenção conjunta de exercício físico (C4)."
    - "Estudos teóricos, qualitativos e mistos aceitos com mesmo peso se pertinentes à Pergunta Norteadora (Metodologia Integrativa + DSR)."
    - "Literatura cinzenta de plataformas peer-reviewed (bioRxiv, medRxiv) aceita."

  exclusion:
    - "Estudos puramente nutricionais, sem intervenção de exercício físico."
    - "Estudos fora do recorte temporal 2010-2026."
    - "Estudos sem metodologia baseada em Design (ex: metodologias estritamente clínicas sem co-design)."

  weights:
    design_methodology: 1.0
    sdt_adherence: 0.5
    integrated_maintenance: 0.8
